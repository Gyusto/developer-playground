# ---------------------------------------------------------------------------
# Developer Playground — Nginx reverse proxy
#
# Routes:
#   /api/  -> api:4000   (portal API, dynamic runtime, webhook receiver, docs)
#   /      -> web:3000   (Next.js portal, incl. HMR websocket in dev)
#
# This is the single public entrypoint; only nginx is published on :80.
# ---------------------------------------------------------------------------

# Upstreams — service names resolve on the docker-compose network.
upstream developer-playground_api {
    server api:4000;
    keepalive 32;
}

upstream developer-playground_web {
    server web:3000;
    keepalive 32;
}

# --- Rate limiting (see NOTE below) -----------------------------------------
# Spec §15 requires rate limits on public sandbox endpoints. The authoritative
# limiter lives in the API (Redis-backed, per-credential). This edge limiter is
# a coarse, IP-based safety net for the runtime + webhook-receiver surface.
# Tune the rate/burst for your deployment before enabling in production.
limit_req_zone $binary_remote_addr zone=developer-playground_runtime:10m rate=20r/s;

# Map the Upgrade header so websocket connections (Next.js HMR, future WS
# simulation) are proxied correctly while plain HTTP keepalive still works.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    # Reject oversized bodies at the edge (mirrors MAX_JSON_BODY_BYTES).
    client_max_body_size 2m;

    # Baseline security headers (the API sets its own via Helmet as well).
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Shared proxy headers for every upstream.
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;

    # ---- API: portal, runtime, webhook-receiver, swagger docs --------------
    location /api/ {
        # NOTE: enable the edge rate limiter for the public sandbox surface.
        # limit_req zone=developer-playground_runtime burst=40 nodelay;

        proxy_pass http://developer-playground_api;

        # Runtime endpoints may have a configured artificial delay; give the
        # upstream generous timeouts so simulated latency is not cut off.
        proxy_connect_timeout 5s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Allow websocket upgrades through the API namespace too (future use).
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # ---- Web: Next.js portal (with HMR websocket support) ------------------
    location / {
        proxy_pass http://developer-playground_web;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_connect_timeout 5s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}
