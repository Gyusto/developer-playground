# ===========================================================================
# Developer Playground — full-stack docker-compose
#
# Services: postgres, redis, api, worker, web, nginx
# Public entrypoint: http://localhost  (nginx :80 -> web :3000 + api :4000)
#
# Values are read from .env (copy .env.example -> .env first). The connection
# strings below deliberately override the localhost defaults from .env with the
# in-network service hostnames (postgres / redis).
# ===========================================================================

services:
  # -------------------------------------------------------------------------
  # PostgreSQL — primary datastore (Prisma)
  # -------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-developer-playground}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-developer-playground}
      POSTGRES_DB: ${POSTGRES_DB:-developer-playground}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      # Exposed for local psql / Prisma Studio; remove in a locked-down prod.
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-developer-playground} -d ${POSTGRES_DB:-developer-playground}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # -------------------------------------------------------------------------
  # Redis — queues (BullMQ), rate limiting, caching, sequence/idempotency state
  # -------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # -------------------------------------------------------------------------
  # API — NestJS (portal API, dynamic runtime, webhook receiver, swagger)
  # -------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      API_PORT: ${API_PORT:-4000}
      # In-network hostnames override the localhost values from .env.
      DATABASE_URL: postgresql://${POSTGRES_USER:-developer-playground}:${POSTGRES_PASSWORD:-developer-playground}@postgres:5432/${POSTGRES_DB:-developer-playground}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Apply pending migrations before booting the API (idempotent, safe to
    # re-run). For multi-replica prod, move this to a dedicated one-shot job.
    command: >
      sh -c "pnpm --filter @developer-playground/database migrate:deploy &&
             pnpm --filter @developer-playground/api start:prod"
    expose:
      - "4000"

  # -------------------------------------------------------------------------
  # Worker — BullMQ consumer (webhook delivery, delayed jobs). No HTTP port.
  # -------------------------------------------------------------------------
  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-developer-playground}:${POSTGRES_PASSWORD:-developer-playground}@postgres:5432/${POSTGRES_DB:-developer-playground}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_URL: redis://redis:6379
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-5}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      # Wait for the API so migrations have been applied before consuming jobs.
      api:
        condition: service_started

  # -------------------------------------------------------------------------
  # Web — Next.js portal
  # -------------------------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      args:
        # Baked into the client bundle at build time. Requests are proxied by
        # nginx, so the browser talks to the same origin under /api.
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
    depends_on:
      api:
        condition: service_started
    expose:
      - "3000"

  # -------------------------------------------------------------------------
  # Nginx — public reverse proxy (the only published service)
  # -------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_started
      web:
        condition: service_started

volumes:
  pgdata:
  redisdata:
